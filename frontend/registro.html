<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/Registro.css">
  <link rel="stylesheet" href="css/main.css">
  <title>Registro - VT Solutions</title>
</head>
<body>

  <nav class="navbar navbar-expand-md navbar-dark">
    <div class="container-fluid px-4">
      <a href="registro.html" class="navbar-brand">
        <img src="img/logo.png" class="logo" alt="VT Solutions">
      </a>
    </div>
  </nav>

  <div class="login container d-flex justify-content-center align-items-center" style="min-height:80vh;">
    <div class="col-md-5 col-lg-4">
      <div class="card shadow border-0 rounded-4">
        <div class="card-body p-4 text-center">
          <h5 class="fw-bold mb-3">Crear Cuenta</h5>
          <form id="registroForm" novalidate>
            <div class="mb-3">
              <label class="form-label fw-semibold">Nombre Completo</label>
              <input type="text" id="nombre" class="form-control" placeholder="Ej: Juan Pérez" autocomplete="off">
            </div>
            <div class="mb-3">
              <label class="form-label fw-semibold">Correo Electrónico</label>
              <input type="email" id="correo" class="form-control" placeholder="ejemplo@correo.com" autocomplete="off">
            </div>
            <div class="mb-3">
              <label class="form-label fw-semibold">Contraseña</label>
              <input type="password" id="password" class="form-control" placeholder="Mínimo 6 caracteres" autocomplete="off">
              <small class="form-text text-muted">Debe tener mayúscula, minúscula y número</small>
            </div>
            <div class="mb-3">
              <label class="form-label fw-semibold">Confirmar Contraseña</label>
              <input type="password" id="confirmPassword" class="form-control" placeholder="Repite tu contraseña" autocomplete="off">
            </div>
            <button type="submit" class="btn btn-primary w-100 rounded-pill mb-2">Registrarse</button>
            <p class="small mb-1">¿Ya tienes una cuenta?
              <a href="login.html" class="text-primary fw-semibold">Inicia Sesión</a>
            </p>
          </form>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/api.js"></script>
  <script src="js/validacion.js"></script>
</body>
</html>
