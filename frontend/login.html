<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/Login.css">
  <link rel="stylesheet" href="css/main.css">
  <title>Login - VT Solutions</title>
</head>
<body>

  <nav class="navbar navbar-expand-md navbar-dark">
    <div class="container-fluid px-4">
      <a href="registro.html" class="navbar-brand">
        <img src="img/logo.png" class="logo" alt="VT Solutions">
      </a>
    </div>
  </nav>

  <div class="login container d-flex justify-content-center align-items-center" style="min-height:80vh;">
    <div class="col-md-5 col-lg-4">
      <div class="card shadow border-0 rounded-4">
        <div class="card-body p-4 text-center">
          <h5 class="fw-bold mb-3">Iniciar Sesión</h5>
          <form id="loginForm">
            <div class="mb-3 text-start">
              <label class="form-label fw-semibold">Correo electrónico</label>
              <input type="email" id="loginEmail" class="form-control" placeholder="ejemplo@gmail.com">
            </div>
            <div class="mb-3 text-start">
              <label class="form-label fw-semibold">Contraseña</label>
              <input type="password" id="loginPassword" class="form-control" placeholder="********">
            </div>
            <button type="submit" class="btn btn-primary w-100 rounded-pill mb-2">Iniciar Sesión</button>
            <p class="small mb-1">¿No tienes cuenta?
              <a href="registro.html" class="text-primary fw-semibold">Regístrate</a>
            </p>
          </form>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/api.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      const form = document.getElementById('loginForm');
      form.addEventListener('submit', async function (e) {
        e.preventDefault();
        const email = document.getElementById('loginEmail').value.trim();
        const password = document.getElementById('loginPassword').value;
        const btn = form.querySelector('button[type="submit"]');

        if (!email || !password) {
          showAlert('Todos los campos son obligatorios', 'danger');
          return;
        }

        btn.disabled = true;
        btn.textContent = 'Iniciando...';

        try {
          const data = await apiFetch('/auth/login', {
            method: 'POST',
            body: JSON.stringify({ email, password })
          });
          Auth.save(data);
          showAlert(`¡Bienvenido, ${data.name}!`, 'success');
          setTimeout(() => {
            window.location.href = 'principal.html';
          }, 800);
        } catch (err) {
          showAlert(err.message, 'danger');
          btn.disabled = false;
          btn.textContent = 'Iniciar Sesión';
        }
      });

      function showAlert(msg, type) {
        let el = document.getElementById('vt-alert');
        if (!el) {
          el = document.createElement('div');
          el.id = 'vt-alert';
          form.prepend(el);
        }
        el.className = `alert alert-${type} py-2 text-center`;
        el.textContent = msg;
      }
    });
  </script>
</body>
</html>
