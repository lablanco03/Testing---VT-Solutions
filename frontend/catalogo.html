<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Catálogo - VT Solutions</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/main.css">
</head>
<body>
  <nav class="navbar navbar-expand-md navbar-dark">
    <div class="container-fluid px-4">
      <a href="principal.html" class="navbar-brand">
        <img src="img/logo.png" class="logo" alt="VT Solutions">
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="menu">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link active" href="catalogo.html">Servicios & Productos</a></li>
          <li class="nav-item"><a class="nav-link active" href="carrito.html">Carrito</a></li>
          <li class="nav-item"><a class="nav-link active" href="pedidos.html">Ver pedidos</a></li>
          <li class="nav-item"><a class="nav-link active" href="login.html">Cerrar Sesion</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- Banner tasas de cambio (API externa) -->
  <div class="bg-dark text-light text-center py-1 small" id="exchange-rates">
    <div class="spinner-border spinner-border-sm text-light" role="status"></div>
  </div>

  <main class="container my-5">
    <h1 class="text-center mb-4">Nuestros Productos</h1>

    <div class="row justify-content-center mb-4">
      <div class="col-6 col-md-8">
        <div class="input-group">
          <input type="text" id="search-input" class="form-control" placeholder="Buscar producto...">
          <button class="btn btn-primary" id="search-btn" type="button">Buscar</button>
        </div>
      </div>
    </div>

    <div class="row g-4" id="products-grid">
      <div class="col-12 text-center">
        <div class="spinner-border text-primary"></div>
      </div>
    </div>
  </main>

  <footer class="mt-5">
    <div class="footer-top text-light">
      <div class="container py-3">
        <div class="d-flex justify-content-between align-items-center flex-wrap mb-3">
          <img src="img/logo.png" class="logo" alt="VT Solutions">
          <a href="principal.html" class="btn btn-primary btn-sm rounded-pill px-4">Contacto</a>
        </div>
      </div>
    </div>
    <div class="footer-bottom text-light">
      <div class="container py-3">
        <div class="d-flex justify-content-between flex-wrap small">
          <div class="d-flex gap-3">
            <a href="#" class="footer-link">Políticas de privacidad</a>
            <a href="#" class="footer-link">Acerca de nosotros</a>
          </div>
          <div>© 2026 VT Solutions. All rights reserved.</div>
        </div>
      </div>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/api.js"></script>
  <script src="js/catalogo.js"></script>
  <script>
    document.getElementById('nav-logout').addEventListener('click', function(e) {
      e.preventDefault(); Auth.logout(); window.location.href = 'Login.html';
    });
  </script>
</body>
</html>
